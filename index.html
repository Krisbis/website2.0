<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Classy hacker vibes homepage with an emulated bash terminal" />
    <title>Homepage</title>

    <!-- Google Fonts: Inter (UI) + JetBrains Mono (code) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 (CSS only) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom styles -->
    <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
        <!-- Loader overlay (CLI style) -->
        <div id="loader-overlay">
            <div class="loader-cli">
                <div class="loader-cli-line"><span id="loader-cli-bar"></span></div>
                <div class="loader-cli-line" id="loader-cli-label">[sudo] updating & upgrading...</div>
                <div class="loader-cli-phrase" id="loader-phrase">Initializing...</div>
            </div>
        </div>
    <!-- Background video -->
    <!-- BG-video created by: saadelm - https://pixabay.com/videos/glitch-transition-overlay-167780/ -->
    <div class="bg-video-wrapper" aria-hidden="true">
        <video id="bgVideo" class="bg-video" autoplay muted loop playsinline preload="auto">
            <source src="assets/videos/background.mp4" type="video/mp4">
            <!-- fallback: silent poster or image -->
        </video>
        <!-- translucent overlay -->
        <div id="bgOverlay" class="bg-overlay"></div>
    </div>
    <nav id="site-navbar" class="navbar navbar-expand-lg navbar-dark bg-transparent px-4" aria-label="Main navigation">
        <div class="container-fluid">
            <a class="navbar-brand autograph autograph-painter p-0" href="index.html">xorxorplain</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="projects/projects.html">Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="blog/index.html">Blog</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="hero container">
        <div class="row justify-content-center">
            <div class="col-12">
                <div class="terminal-wrapper mx-auto">
                <div class="card bg-dark text-light shadow-sm terminal-card">
                    <div class="card-body p-3">
                        <div id="terminal" class="terminal" aria-label="Emulated terminal" role="region">
                            <div id="output" class="output" aria-live="polite"></div>
                            <div class="prompt-row">
                                <span class="prompt">user@neon:~$</span>
                                <input id="cmdInput" class="cmd-input" autocomplete="off" autofocus spellcheck="false" aria-label="Terminal input" />
                            </div>
                        </div>
                    </div>
                    <div class="card-footer bg-transparent d-flex justify-content-between small">
                        <div class="text-muted">terminal • emulation</div>
                        <div>
                            <button id="btnClear" class="btn btn-sm btn-outline-secondary">Clear</button>
                        </div>
                    </div>
                </div>
                </div>
            </div>
        </div>
    </header>

    <footer style="display:none"></footer>

    <!-- Bootstrap JS (bundle includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Terminal logic -->
    <script src="assets/js/terminal.js"></script>
    <script src="assets/js/title-glitch.js"></script>
    <script src="assets/js/loader.js"></script>

        <!-- Background overlay controls -->
        <div id="bgControls" class="bg-controls" aria-hidden="false" title="Background overlay opacity">
            <label for="bgOpacityRange" class="visually-hidden">Background overlay opacity</label>
            <input id="bgOpacityRange" type="range" min="0" max="1" step="0.01" value="0.35" />
        </div>

        <script>
            // wire background opacity control
            (function(){
                const range = document.getElementById('bgOpacityRange');
                const overlay = document.getElementById('bgOverlay');
                if(!range || !overlay) return;
                // initialize CSS variable
                const setAlpha = v => document.documentElement.style.setProperty('--bg-overlay-alpha', v);
                setAlpha(range.value);
                range.addEventListener('input', (e)=>{ setAlpha(e.target.value); });
            })();
        </script>

    <script>
        // set current year
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
